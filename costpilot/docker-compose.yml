services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: src/CostPilot.Gateway.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__CostPilotDb=${DATABASE_URL}
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER}
      - JwtSettings__Audience=${JWT_AUDIENCE}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RABBITMQ_DEFAULT_USER}
      - RabbitMq__Password=${RABBITMQ_DEFAULT_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  spend-agent:
    build:
      context: ./agents
      dockerfile: spend-agent/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_TYPE=spend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sla-agent:
    build:
      context: ./agents
      dockerfile: sla-agent/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_TYPE=sla
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  resource-agent:
    build:
      context: ./agents
      dockerfile: resource-agent/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_TYPE=resource
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  finops-agent:
    build:
      context: ./agents
      dockerfile: finops-agent/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_TYPE=finops
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "4200:80"
    depends_on:
      - gateway

volumes:
  pgdata:
